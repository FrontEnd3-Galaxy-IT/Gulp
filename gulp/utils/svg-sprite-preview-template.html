<script>
  document.querySelectorAll(".js-copy-to-clipboard").forEach(elem => {
    elem.addEventListener("click", () => {
      let text = ("/icon/stack/sprite.svg#" + elem.previousElementSibling.textContent) || ""

      navigator.clipboard.writeText(text)
        .then(() => {
          elem.classList.add('bounce')
          setTimeout(() => {
            elem.classList.remove('bounce')
          }, 500)
          console.log("Text successfully copied to clipboard!")
        })
        .catch(err => {
          console.error("Failed to copy text: ", err)
        })
    })
  })

  function devProjectsSearch() {
    let searchInput = document.querySelector(".js-projects-search input")
    let searchContainer = document.querySelector(".js-projects-search-container")
    let noResultsMessage = searchContainer.querySelector(".no-results-message")
    let projectLists = document.querySelectorAll(".js-projects-search-list")

    if (!searchInput || projectLists.length === 0) {
      return
    }

    searchInput.addEventListener("input", function() {
      let filter = searchInput.value.toLowerCase()
      let hasVisibleProjects = false
      projectLists.forEach(function(projectList) {
        let projects = projectList.querySelectorAll(".js-projects-search-item")
        let listHasVisibleProjects = false
        projects.forEach(function(project) {
          let projectLinks = project.querySelectorAll(".js-projects-search-name") // Get all project links

          let projectMatches = false
          projectLinks.forEach(function(projectLink) {
            let projectName = projectLink.textContent.toLowerCase()

            if (projectName.includes(filter)) {
              projectMatches = true
            }
          })

          if (projectMatches) {
            project.classList.remove("hidden")
            listHasVisibleProjects = true
          } else {
            project.classList.add("hidden")
          }
        })

        if (listHasVisibleProjects) {
          hasVisibleProjects = true
        }
      })

      if (hasVisibleProjects) {
        noResultsMessage.classList.add("hidden")
      } else {
        noResultsMessage.classList.remove("hidden")
      }
    })
  }

  devProjectsSearch()
</script>
